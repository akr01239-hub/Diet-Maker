services:
  - type: web
    name: nutriai-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build && npx prisma migrate deploy && npm run seed
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set in Render dashboard (from Neon, pooled)
      - key: DIRECT_URL
        sync: false          # set in Render dashboard (from Neon, direct)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: HEALTH_DATA_ENCRYPTION_KEY
        sync: false          # set in Render dashboard (32-byte base64)
      - key: AI_PROVIDER
        value: rules
      - key: USDA_FDC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
